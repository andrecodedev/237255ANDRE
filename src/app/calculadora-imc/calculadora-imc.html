<div class="container-formulario">
	<h2>Calculadora de IMC</h2>
	<p class="voltar"><a routerLink="/home">Voltar para Home</a></p>

	<form class="formulario">
		<div class="campo">
			<label for="peso">Peso (kg)</label>
			<input id="peso" type="number" [(ngModel)]="peso" name="peso" min="1" step="0.1" placeholder="Ex.: 72.5" />
		</div>

		<div class="campo">
			<label for="altura">Altura (m)</label>
			<input id="altura" type="number" [(ngModel)]="altura" name="altura" min="0.1" step="0.01" placeholder="Ex.: 1.75" />
		</div>

		<div class="acoes">
			<button type="button" class="btn-primario" (click)="calcularImc()">Calcular</button>
			<button type="button" class="btn-secundario" (click)="limpar()">Limpar</button>
		</div>
	</form>

	<p *ngIf="erro" class="mensagem-erro">{{ erro }}</p>

	<section *ngIf="showResult" class="resultado">
		<h3>Resultado</h3>
		<p><strong>IMC:</strong> {{ imc?.toFixed(2) }}</p>
		<p><strong>Classificacao:</strong> {{ classificacao }}</p>
	</section>
</div>
