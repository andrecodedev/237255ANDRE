<main class="home-page">
  <section class="hero" aria-label="Boas-vindas da loja">
    <p class="eyebrow">E-commerce Simples</p>
    <h1>Bem-vindo a Loja Angular</h1>
    <p class="subtitle">Navegue pelos produtos e confira as ofertas do dia.</p>
  </section>

  <section class="actions">
    <button type="button" class="toggle-btn" (click)="toggleBanner()">Mostrar/Ocultar Banner</button>
  </section>

  <section *ngIf="showBanner" class="promo-banner" aria-live="polite">
    <h2>Promocao Especial</h2>
    <p>Frete gratis em compras acima de R$ 199,00 e 10% de desconto no primeiro pedido.</p>
    <a routerLink="/produtos" class="cta-link">Ver produtos</a>
  </section>
</main>
